name: CI

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  # Reusable: release.yml calls this to re-run the full check suite before it
  # publishes.
  workflow_call: {}

permissions:
  contents: read

# Ensure scripts are run with pipefail. See:
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      # Avoid duplicate PR annotations.
      - name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - run: npx hereby build

  release-build:
    # Host-only smoke on PRs: verify the release build + packaging still work.
    # The full multi-platform build + publish runs in release.yml on main.
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      # Avoid duplicate PR annotations.
      - name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - run: npx hereby tlua:release --forRelease --setBuild ${{ github.run_number }} --hostOnly

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0

      - run: npm ci

      - run: npm run extension:build

  test:
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        config:
          - os: ubuntu-latest
            coverage: true
            main: true
          - os: windows-latest
            coverage: true
            skip: ${{ github.event_name == 'merge_group' }}
          - os: macos-latest
            coverage: true
            # There aren't enough macOS runners; skip in PRs and rely on main branch runs.
            skip: ${{ github.event_name == 'merge_group' || github.event_name == 'pull_request' }}
          - os: ubuntu-latest
            name: 'no submodules'
            no-submodules: true
          - os: ubuntu-latest
            name: 'noembed'
            noembed: true
          # Guards the parallel checker pool: the ordinary suite cannot see a data
          # race, so without this job one goes unnoticed until it flakes a build.
          - os: ubuntu-latest
            name: 'race mode'
            race: true
          - os: ubuntu-latest
            name: 'concurrent test programs'
            concurrent-test-programs: true
            coverage: true
        exclude:
          - config:
              skip: true

    name: test (${{ matrix.config.name || matrix.config.os }})

    runs-on: ${{ matrix.config.os }}

    permissions:
      contents: read

    env:
      TLUA_HEREBY_RACE: ${{ (matrix.config.race && 'true') || 'false' }}
      TLUA_HEREBY_NOEMBED: ${{ (matrix.config.noembed && 'true') || 'false' }}
      TLUA_HEREBY_CONCURRENT_TEST_PROGRAMS: ${{ (matrix.config.concurrent-test-programs && 'true') || 'false' }}
      TLUA_HEREBY_COVERAGE: ${{ (matrix.config.coverage && 'true') || 'false' }}

    steps:
      - run: git config --system core.longpaths true
        if: ${{ matrix.config.os == 'windows-latest' }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: ${{ !matrix.config.no-submodules }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      # Avoid duplicate PR annotations.
      - if: ${{ ! matrix.config.main }}
        name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - name: Tests
        id: test
        run: npx hereby test

      - name: Benchmarks
        run: npx hereby test:benchmarks

      - name: Tools Tests
        run: npx hereby test:tools

      - name: API Tests
        run: npx hereby test:api

      - run: git add .

      - run: git diff --staged --exit-code --stat

      - name: Print baseline diff on failure
        if: ${{ failure() && steps.test.conclusion == 'failure' }}
        run: |
          npx hereby baseline-accept
          git add testdata/baselines/reference
          git diff --staged --exit-code
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && steps.test.conclusion == 'failure' }}
        with:
          name: ${{ matrix.config.name || matrix.config.os }}-new-baselines-artifact
          path: testdata/baselines/local

  lint:
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        config:
          - os: ubuntu-latest
            main: true
          - os: windows-latest
            skip: ${{ github.event_name == 'merge_group' }}
          # Skip macOS; we do not have any build tag'd files that require checking.
          # - os: macos-latest
          #   skip: ${{ github.event_name == 'merge_group' }}
          - os: ubuntu-latest
            name: 'noembed'
            noembed: true
            skip: ${{ github.event_name == 'merge_group' }}
        exclude:
          - config:
              skip: true

    name: lint (${{ matrix.config.name || matrix.config.os }})

    runs-on: ${{ matrix.config.os }}

    env:
      TLUA_HEREBY_NOEMBED: ${{ (matrix.config.noembed && 'true') || 'false' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      # Avoid duplicate PR annotations.
      - if: ${{ ! matrix.config.main }}
        name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - run: npx hereby lint

  format:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      - run: npm ci

      - run: npx hereby check:format

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '>=22.16.0'
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      - run: npm ci

      # Regenerate the committed generated files from local source and fail if
      # anything drifted. All deterministic and local — no submodule, no network
      # (the lsproto fetchModel and fourslash-from-upstream steps are omitted).
      - run: npx hereby generate
      - run: npx hereby generate:enums
      - run: npx hereby generate:ast
      - run: npx hereby generate:vendor
      - run: npx hereby generate:extension

      - run: git add .
      - run: git diff --staged --exit-code --stat

  tidy:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      - run: go mod tidy -diff
      - run: go -C ./_tools mod tidy -diff

  misc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            _tools/go.sum

      - run: npm ci

      - run: go -C ./_tools run ./cmd/checkmodpaths $PWD

      - run: npx hereby check:scripts

      - run: npx hereby tlua:check-platforms

  required:
    runs-on: ubuntu-slim
    if: ${{ always() }}
    needs:
      - build
      - release-build
      - extension
      - format
      - generate
      - lint
      - misc
      - test
      - tidy

    steps:
      - name: Check required jobs
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          ! echo $NEEDS | jq -e 'to_entries[] | { job: .key, result: .value.result } | select((.result == "success" or .result == "skipped") | not)'
