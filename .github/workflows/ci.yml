name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  # Allow manually triggering a run (and, on main, a publish).
  workflow_dispatch: {}

permissions:
  contents: read

# Ensure scripts are run with pipefail. See:
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: ./.github/actions/setup-go

      # Avoid duplicate PR annotations.
      - name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - run: npx hereby build

  release-build:
    if: ${{ github.event_name != 'merge_group' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
      - uses: dtolnay/rust-toolchain@fcf085fcb4b4b8f63f96906cd713eb52181b5ea4 # stable
      - uses: ./.github/actions/setup-go

      # Avoid duplicate PR annotations.
      - name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - run: npx hereby tlua:release --forRelease --setBuild ${{ github.run_number }}

      # Make the packed npm tarballs and VSIX extensions downloadable from the
      # run. (Publishing the npm packages to the registry happens in `publish`;
      # the VS Code Marketplace needs an Azure subscription, so the VSIX ships
      # only as a run artifact for now.)
      - name: Upload npm package tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages
          # Include publish-manifest.json so the `publish` job can publish these
          # exact tarballs (in order) without rebuilding.
          path: |
            built/npm/*.tgz
            built/npm/publish-manifest.json
          if-no-files-found: error
      - name: Upload VSIX extensions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix-extensions
          path: built/vsix/*.vsix
          if-no-files-found: error

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0

      - run: npm ci

      - run: npm run extension:build

  test:
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        config:
          - os: ubuntu-latest
            coverage: true
            main: true
          - os: windows-latest
            coverage: true
            skip: ${{ github.event_name == 'merge_group' }}
          - os: macos-latest
            coverage: true
            # There aren't enough macOS runners; skip in PRs and rely on main branch runs.
            skip: ${{ github.event_name == 'merge_group' || github.event_name == 'pull_request' }}
          - os: ubuntu-latest
            name: 'no submodules'
            no-submodules: true
          - os: ubuntu-latest
            name: 'noembed'
            noembed: true
          - os: ubuntu-latest
            name: 'concurrent test programs'
            concurrent-test-programs: true
            coverage: true
        exclude:
          - config:
              skip: true

    name: test (${{ matrix.config.name || matrix.config.os }})

    runs-on: ${{ matrix.config.os }}

    permissions:
      id-token: write
      contents: read

    env:
      TLUA_HEREBY_RACE: ${{ (matrix.config.race && 'true') || 'false' }}
      TLUA_HEREBY_NOEMBED: ${{ (matrix.config.noembed && 'true') || 'false' }}
      TLUA_HEREBY_CONCURRENT_TEST_PROGRAMS: ${{ (matrix.config.concurrent-test-programs && 'true') || 'false' }}
      TLUA_HEREBY_COVERAGE: ${{ (matrix.config.coverage && 'true') || 'false' }}

    steps:
      - run: git config --system core.longpaths true
        if: ${{ matrix.config.os == 'windows-latest' }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: ${{ !matrix.config.no-submodules }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
      - uses: ./.github/actions/setup-go

      # Avoid duplicate PR annotations.
      - if: ${{ ! matrix.config.main }}
        name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - run: go install gotest.tools/gotestsum@latest
        # Installing gotestsum is super slow on Windows.
        # Also, avoid using it in race mode so we get the full output.
        if: ${{ matrix.config.os != 'windows-latest' && !matrix.config.race }}

      - name: Tests
        id: test
        run: npx hereby test

      - name: Benchmarks
        run: npx hereby test:benchmarks

      - name: Tools Tests
        run: npx hereby test:tools

      - name: API Tests
        run: npx hereby test:api

      - run: git add .

      - run: git diff --staged --exit-code --stat

      - name: Print baseline diff on failure
        if: ${{ failure() && steps.test.conclusion == 'failure' }}
        run: |
          npx hereby baseline-accept
          git add testdata/baselines/reference
          git diff --staged --exit-code
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && steps.test.conclusion == 'failure' }}
        with:
          name: ${{ matrix.config.os }}-${{ (matrix.config.race && 'race') || 'norace' }}-new-baselines-artifact
          path: testdata/baselines/local

  lint:
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        config:
          - os: ubuntu-latest
            main: true
          - os: windows-latest
            skip: ${{ github.event_name == 'merge_group' }}
          # Skip macOS; we do not have any build tag'd files that require checking.
          # - os: macos-latest
          #   skip: ${{ github.event_name == 'merge_group' }}
          - os: ubuntu-latest
            name: 'noembed'
            noembed: true
            skip: ${{ github.event_name == 'merge_group' }}
        exclude:
          - config:
              skip: true

    name: lint (${{ matrix.config.name || matrix.config.os }})

    runs-on: ${{ matrix.config.os }}

    env:
      TLUA_HEREBY_NOEMBED: ${{ (matrix.config.noembed && 'true') || 'false' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: ./.github/actions/setup-go

      # Avoid duplicate PR annotations.
      - if: ${{ ! matrix.config.main }}
        name: Disable PR annotations
        run: |
          echo "::remove-matcher owner=eslint-compact::"
          echo "::remove-matcher owner=eslint-stylish::"
          echo "::remove-matcher owner=tsc::"
          echo "::remove-matcher owner=go::"

      - run: npm ci

      - run: npx hereby lint

  format:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: ./.github/actions/setup-go

      - run: npm ci

      - run: npx hereby check:format

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '>=22.16.0'
      - uses: ./.github/actions/setup-go

      - run: npm ci

      # Regenerate the committed generated files from local source and fail if
      # anything drifted. All deterministic and local — no submodule, no network
      # (the lsproto fetchModel and fourslash-from-upstream steps are omitted).
      - run: npx hereby generate
      - run: npx hereby generate:enums
      - run: npx hereby generate:ast
      - run: npx hereby generate:vendor
      - run: npx hereby generate:extension

      - run: git add .
      - run: git diff --staged --exit-code --stat

  tidy:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-go

      - run: go mod tidy -diff
      - run: go -C ./_tools mod tidy -diff

  misc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - uses: ./.github/actions/setup-go

      - run: npm ci

      - run: go -C ./_tools run ./cmd/checkmodpaths $PWD

      - run: npx hereby check:scripts

      - run: npx hereby tlua:check-platforms

  required:
    runs-on: ubuntu-slim
    if: ${{ always() }}
    needs:
      - build
      - release-build
      - extension
      - format
      - generate
      - lint
      - misc
      - test
      - tidy

    steps:
      - name: Check required jobs
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          ! echo $NEEDS | jq -e 'to_entries[] | { job: .key, result: .value.result } | select((.result == "success" or .result == "skipped") | not)'

  # Publishes a rolling release of the npm packages to the `latest` dist-tag on
  # every merge to main, gated on all checks above passing (needs: required). It
  # publishes the exact tarballs built by `release-build` (downloaded as the
  # `npm-packages` artifact) instead of rebuilding — build once, publish those
  # bytes. The version is 0.0.<run_number>, a plain monotonic version, so
  # `npm install @tlua/compiler` always resolves to the newest build.
  #
  # VSIX publishing to the VS Code Marketplace is omitted (it needs an Azure
  # subscription); the VSIX ships as the `vsix-extensions` run artifact instead.
  publish:
    runs-on: ubuntu-latest
    needs: [required]
    # Only on a push/dispatch to main, and only in the canonical repo (forks lack
    # the NPM_TOKEN secret). `needs: required` gates on green checks and ensures
    # release-build (which produced the npm-packages artifact) finished first.
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && github.repository_owner == 'apyrr' }}
    # Never run two publishes at once; let an in-flight one finish.
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      # The exact tarballs + publish-manifest.json built by release-build.
      - name: Download npm packages
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: npm-packages
          path: built/npm

      # npm — publish in the order recorded by pack-packages: platform packages
      # first, then the main package that depends on them. access/dist-tag come
      # from each package's baked-in publishConfig.
      - name: Publish to npm
        working-directory: built/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          jq -c '.stages[]' publish-manifest.json | while read -r stage; do
            echo "$stage" | jq -r '.[].filename' | while read -r f; do
              echo "npm publish $f"
              npm publish "$f"
            done
          done
